meters:
- name: adau
  description: Active daily active users on Ory Network, billed per aDAU/month above the plan credit.
  unit: users
  aggregation: sum
  dimensions:
  - workspace
  - project
- name: m2m_tokens
  description: Machine-to-machine OAuth2 tokens issued, billed per token/month above the plan credit.
  unit: tokens
  aggregation: sum
  dimensions:
  - workspace
  - project
- name: permission_checks
  description: Keto permission checks performed, billed per check/month above the plan credit.
  unit: checks
  aggregation: sum
  dimensions:
  - workspace
  - project
- name: plan_subscription
  description: Flat annual Ory Network plan subscription (Production / Growth) with included monthly usage credit.
  unit: contract
  aggregation: sum
  dimensions:
  - workspace
- name: self_hosted_compute
  description: Infrastructure cost of running the self-hosted open-source Ory stack (no Ory invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track aDAU, M2M token, and permission-check consumption per project against the plan's included credit; on self-hosted, monitor compute and database cost.
- name: Allocation
  description: Map projects and environments (prod/staging/dev) to teams and cost centers; tag Console API tokens per workload.
- name: Optimization
  description: Right-size the plan to your aDAU/M2M/permission-check volume, prune stale sessions and unused OAuth2 clients, batch permission checks, and self-host the open-source stack when volume makes it cheaper than metered cloud.
- name: Accountability
  description: Assign owners per project/workspace; review monthly usage against the included credit and per-unit overage, and against self-hosted infrastructure budgets.
