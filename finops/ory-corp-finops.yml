description: >-
  FinOps view of Ory spend. The Ory stack (Kratos, Hydra, Keto, Oathkeeper) is
  open source (Apache-2.0) and free to self-host - in that model the cost is your
  own compute, database, and network for running the services, with no Ory
  invoice. Ory Network is the managed offering, billed as a flat plan subscription
  (Production / Growth) that includes a monthly usage credit, plus metered overage
  driven mainly by active daily active users (aDAU), machine-to-machine (M2M)
  tokens, and permission checks. Enterprise agreements cover committed-usage
  discounts, multi-region, and SLAs.
notes: >-
  Ory Network per-unit rates and included credits are subject to change; verify
  against the Ory pricing page during reconciliation. For self-hosted deployments,
  the dominant costs are infrastructure (compute + database) rather than an Ory
  license fee.
