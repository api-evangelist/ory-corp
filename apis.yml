aid: ory-corp
url: https://raw.githubusercontent.com/api-evangelist/ory-corp/refs/heads/main/apis.yml
name: Ory
kind: company
description: Ory builds open-source identity and access infrastructure and runs it as
  the Ory Network managed cloud. The stack is composed of Ory Kratos (identities,
  sessions, and self-service login/registration/recovery/verification/settings
  flows), Ory Hydra (OAuth2 and OpenID Connect - clients, tokens, consent, and
  introspection), Ory Keto (Google Zanzibar-style permissions and relationship
  tuples), and Ory Oathkeeper (zero-trust access proxy). On the Ory Network, all
  services are exposed on a single project-scoped base URL
  (https://{project-slug}.projects.oryapis.com) with admin and public surfaces,
  while workspaces, projects, organizations (B2B SSO), event streams, and billing
  are managed through the Ory Network Console API (https://api.console.ory.sh).
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Identity
- Authentication
- OAuth2
- OpenID Connect
- Authorization
- Permissions
- IAM
- Open Source
