aid: ory-corp
name: Ory
review:
  question: Does Ory expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Ory's public API surface - the Ory
    Network project data plane (Kratos identity and self-service flows, Hydra
    OAuth2/OIDC, Keto permissions, courier) and the Ory Network Console API - is
    request/response REST over HTTPS. There is no server-push transport
    (WebSocket or SSE) on Ory's own API to model. Ory's asynchronous delivery is
    outbound: Ory Actions fire HTTP webhooks during identity flows, and Ory
    Network Event Streams forward events to external sinks such as AWS SNS. Those
    are server-to-endpoint HTTP / cloud-messaging transports, not a WebSocket the
    client connects to, so they are out of scope for an Ory AsyncAPI document.
findings:
  summary: |
    Ory does not publish a documented public WebSocket API. Ory is open-source
    identity and access infrastructure - Kratos (identities, sessions,
    self-service flows), Hydra (OAuth2 / OIDC), Keto (Zanzibar-style
    permissions), and Oathkeeper (access proxy) - delivered as the Ory Network
    managed cloud. On Ory Network, all project services are served on a
    project-scoped host (https://{project-slug}.projects.oryapis.com) split into
    public/frontend and privileged /admin surfaces; the control plane (projects,
    tokens, event streams, subscriptions) is served on the Ory Network Console
    API (https://api.console.ory.sh). Every documented endpoint is
    request/response REST over HTTPS, authenticated for privileged calls with an
    Ory API key (ory_pat_ / ory_wak_) as a Bearer token. Ory delivers events
    asynchronously by firing HTTP webhooks via Ory Actions during identity flows
    and by forwarding events to external sinks (for example AWS SNS) via Ory
    Network Event Streams - neither is a client-facing WebSocket. No realtime,
    bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is
    documented on Ory's own API as of the review date.
  openSource: |
    The core Ory stack is open source (Apache-2.0) and self-hostable via
    Docker/Kubernetes: Ory Kratos, Ory Hydra, Ory Keto, and Ory Oathkeeper live
    under github.com/ory. Self-hosted deployments carry no Ory fee - only your
    own infrastructure. The Ory Network is the managed cloud that runs the same
    engines behind one project-scoped base URL, adding a Console control plane,
    B2B organizations, event streams, and billing. Ory SDKs are auto-generated
    from these OpenAPI specifications.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://{project-slug}.projects.oryapis.com
      documented: true
      note: Project data plane - Kratos self-service and admin, Hydra OAuth2/OIDC public and admin, Keto permissions and relationship writes, courier.
    - protocol: REST
      scheme: https
      baseURL: https://api.console.ory.sh
      documented: true
      note: Ory Network Console API - workspaces, projects, project tokens, event streams, subscriptions.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Ory Actions fire outbound HTTP webhooks during identity flows (before/after login, registration, settings, recovery, verification). Server-to-endpoint HTTP, not WebSocket.
    - protocol: Event Stream
      scheme: https
      documented: true
      note: Ory Network Event Streams forward events to external sinks such as AWS SNS. Cloud messaging to a third-party sink, not a client-facing WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Ory Kratos, Hydra, Keto, Oathkeeper, or the Ory Network Console API as of the review date.
