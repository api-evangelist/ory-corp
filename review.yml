sources:
  - url: https://www.ory.com/docs/reference/api
    type: Documentation
    note: Ory REST HTTP API overview; project-scoped base URL {slug}.projects.oryapis.com; all REST. No WebSocket mentioned.
  - url: https://www.ory.com/docs/kratos/reference/api
    type: APIReference
    note: Kratos self-service flows and admin identity/session management; confirmed via ory/client-go openapi (identities, sessions, recovery, courier).
  - url: https://www.ory.com/docs/hydra/reference/api
    type: APIReference
    note: Hydra OAuth2/OIDC public and admin endpoints; confirmed clients, introspect, login/consent/logout requests, keys, trust grants, token/auth/revoke/userinfo/well-known.
  - url: https://www.ory.com/docs/keto/reference/rest-api
    type: APIReference
    note: Keto read/check/expand/namespaces and /admin/relation-tuples write; batch check and /opl/syntax/check confirmed via ory/keto spec.
