actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists, and Ory's own public API is
    request/response REST (project data plane on oryapis.com plus the Console
    API on api.console.ory.sh). No AsyncAPI document was created because there is
    no server-push transport on Ory's own API to model; Ory's asynchronous
    behavior is outbound HTTP webhooks (Ory Actions) and event forwarding to
    external sinks (Ory Network Event Streams to AWS SNS), which carry their own
    transports and are out of scope for an Ory AsyncAPI document.
