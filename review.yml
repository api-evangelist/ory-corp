    type: Documentation
    note: Ory Network Console API base https://api.console.ory.sh; project and project-token endpoints; ory_wak_ workspace API key Bearer auth.
  - url: https://www.ory.com/docs/guides/event-streams/aws-sns
    type: Documentation
    note: Event Streams forward Ory Network events to AWS SNS. Outbound cloud messaging, not a client WebSocket.
  - url: https://github.com/ory
