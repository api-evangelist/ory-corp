      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventStream' }
      responses:
        '201':
          description: The created event stream.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventStream' }
  /projects/{projectId}/eventStreams/{eventStreamId}:
    parameters:
      - { name: projectId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eventStreamId, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      operationId: setEventStream
      tags: [Event Streams]
      summary: Update an event stream
      servers:
        - url: https://api.console.ory.sh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EventStream' }
      responses:
        '200':
          description: The updated event stream.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventStream' }
    delete:
      operationId: deleteEventStream
      tags: [Event Streams]
      summary: Delete an event stream
      servers:
        - url: https://api.console.ory.sh
      responses:
        '204': { description: Event stream deleted. }

  # ---------------- Console: Billing ----------------
  /workspaces/{workspace}/subscription:
    parameters:
      - { name: workspace, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getWorkspaceSubscription
      tags: [Billing]
      summary: Get a workspace subscription
      servers:
        - url: https://api.console.ory.sh
      responses:
        '200':
          description: The active subscription.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
    post:
      operationId: createWorkspaceSubscription
      tags: [Billing]
      summary: Create or change a workspace subscription
      servers:
        - url: https://api.console.ory.sh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Subscription' }
      responses:
        '201':
          description: The created subscription.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
components:
  securitySchemes:
    oryApiKey:
      type: http
      scheme: bearer
      description: >-
        Ory API key. Project admin endpoints use an Ory project API key
        (ory_pat_...); Console endpoints use a workspace API key (ory_wak_...).
        Passed as `Authorization: Bearer <token>`.
  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: integer }
            status: { type: string }
            message: { type: string }
            reason: { type: string }
    Identity:
      type: object
      properties:
        id: { type: string, format: uuid }
        schema_id: { type: string }
        state: { type: string, enum: [active, inactive] }
        traits: { type: object, additionalProperties: true }
        verifiable_addresses:
          type: array
          items: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IdentityInput:
      type: object
      required: [schema_id, traits]
      properties:
        schema_id: { type: string }
        state: { type: string, enum: [active, inactive] }
        traits: { type: object, additionalProperties: true }
        credentials: { type: object, additionalProperties: true }
    Session:
      type: object
      properties:
        id: { type: string, format: uuid }
        active: { type: boolean }
        expires_at: { type: string, format: date-time }
        authenticated_at: { type: string, format: date-time }
        identity: { $ref: '#/components/schemas/Identity' }
    OAuth2Client:
      type: object
      properties:
        client_id: { type: string }
        client_name: { type: string }
        client_secret: { type: string }
        redirect_uris:
          type: array
          items: { type: string, format: uri }
        grant_types:
          type: array
          items: { type: string }
        response_types:
          type: array
          items: { type: string }
        scope: { type: string }
        token_endpoint_auth_method: { type: string }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string }
        expires_in: { type: integer }
        refresh_token: { type: string }
        id_token: { type: string }
        scope: { type: string }
    RelationTuple:
      type: object
      required: [namespace, object, relation]
      properties:
        namespace: { type: string }
        object: { type: string }
        relation: { type: string }
        subject_id: { type: string }
        subject_set:
          type: object
          properties:
            namespace: { type: string }
            object: { type: string }
            relation: { type: string }
    CourierMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [queued, sent, processing, abandoned] }
        type: { type: string, enum: [email, phone] }
        recipient: { type: string }
        subject: { type: string }
        template_type: { type: string }
        created_at: { type: string, format: date-time }
    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        domains:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        workspace_id: { type: string, format: uuid }
        environment: { type: string, enum: [prod, stage, dev] }
        state: { type: string }
    ProjectApiKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        value: { type: string }
        created_at: { type: string, format: date-time }
    EventStream:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [sns] }
        topic_arn: { type: string }
        aws_iam_role_arn: { type: string }
        role_arn: { type: string }
    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        plan: { type: string, enum: [developer, production, growth, enterprise] }
        interval: { type: string, enum: [monthly, yearly] }
        currency: { type: string }
        status: { type: string }
